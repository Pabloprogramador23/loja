{% extends "base.html" %}
{% block title %}E-mail Enviado{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12 text-center">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
        <svg class="w-16 h-16 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-2">E-mail enviado!</h2>
        <p class="text-gray-500 dark:text-gray-400">Verifique sua caixa de entrada e clique no link para redefinir sua senha. O link expira em 24h.</p>
        <a href="{% url 'index' %}" class="mt-6 inline-block text-indigo-600 dark:text-indigo-400 hover:underline text-sm">
            Voltar ao início
        </a>
    </div>
</div>
{% endblock %}
