{% extends "base.html" %}
{% block title %}Recuperar Senha{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-2">Recuperar senha</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
                <input type="email" name="email" required
                    class="w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 p-2.5 text-sm">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition">
                Enviar link de recuperação
            </button>
        </form>
        <p class="text-center text-sm mt-4">
            <a href="{% url 'login' %}" class="text-indigo-600 dark:text-indigo-400 hover:underline">Voltar ao login</a>
        </p>
    </div>
</div>
{% endblock %}
