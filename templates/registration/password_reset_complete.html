{% extends "base.html" %}
{% block title %}Senha Redefinida{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12 text-center">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
        <svg class="w-16 h-16 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-2">Senha redefinida!</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-6">Sua senha foi alterada com sucesso.</p>
        <a href="{% url 'login' %}" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2.5 rounded-lg transition">
            Fazer login
        </a>
    </div>
</div>
{% endblock %}
