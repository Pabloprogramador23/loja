<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md p-6 relative">
    <button
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"
        _="on click add .hidden to #auth-modal-container">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>

    <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-1">Identificação</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">Entre ou cadastre-se para finalizar o pedido</p>

    <!-- Tabs -->
    <div class="flex border-b border-gray-200 dark:border-gray-700 mb-5" id="auth-tabs">
        <button id="tab-entrar" onclick="showTab('entrar')"
            class="px-4 py-2 text-sm font-medium border-b-2 border-indigo-600 text-indigo-600 dark:text-indigo-400 dark:border-indigo-400">
            Entrar
        </button>
        <button id="tab-cadastrar" onclick="showTab('cadastrar')"
            class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:text-gray-400">
            Cadastrar
        </button>
    </div>

    <!-- Aba Entrar -->
    <div id="pane-entrar">
        {% include 'accounts/partials/modal_login.html' %}
    </div>

    <!-- Aba Cadastrar -->
    <div id="pane-cadastrar" style="display:none">
        {% include 'accounts/partials/modal_signup.html' %}
    </div>
</div>

<script>
function showTab(tab) {
    const tabs = ['entrar', 'cadastrar'];
    tabs.forEach(t => {
        const btn = document.getElementById('tab-' + t);
        const pane = document.getElementById('pane-' + t);
        if (!btn || !pane) return;
        if (t === tab) {
            btn.classList.add('border-indigo-600', 'text-indigo-600', 'dark:text-indigo-400', 'dark:border-indigo-400');
            btn.classList.remove('border-transparent', 'text-gray-500');
            pane.style.display = '';
        } else {
            btn.classList.remove('border-indigo-600', 'text-indigo-600', 'dark:text-indigo-400', 'dark:border-indigo-400');
            btn.classList.add('border-transparent', 'text-gray-500');
            pane.style.display = 'none';
        }
    });
}
</script>
