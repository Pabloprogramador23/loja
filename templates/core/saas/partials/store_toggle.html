<form id="toggle-form-{{ store.pk }}"
      hx-post="{% url 'saas_store_toggle' store.pk %}"
      hx-target="#toggle-{{ store.pk }}"
      hx-swap="innerHTML">
    {% csrf_token %}
    {% if store.is_active %}
    <button type="submit"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-200 border border-green-200 dark:border-green-700 hover:bg-green-200 dark:hover:bg-green-900/70 transition cursor-pointer">
        <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
        Ativa
    </button>
    {% else %}
    <button type="submit"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-gray-600 hover:bg-gray-200 dark:hover:bg-gray-600 transition cursor-pointer">
        <span class="inline-block w-2 h-2 rounded-full bg-gray-400"></span>
        Inativa
    </button>
    {% endif %}
</form>
