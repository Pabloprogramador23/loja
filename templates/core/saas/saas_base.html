<!DOCTYPE html>
<html lang="pt-br" class="{% if theme_pref == 'dark' %}dark{% endif %}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel SaaS — StoreSaaS{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>
        (function () {
            var serverPref = '{{ theme_pref }}';
            var stored = null;
            try { stored = localStorage.getItem('theme'); } catch (e) { }
            var pref = (serverPref && serverPref !== 'system') ? serverPref : (stored || 'system');
            var isDark = pref === 'dark' ? true : pref === 'light' ? false : window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.classList.toggle('dark', isDark);
        })();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.body.addEventListener('htmx:configRequest', function (event) {
                event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
            });
        });
    </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 dark:text-gray-100 font-sans transition-colors" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    {% csrf_token %}

    <!-- Sidebar SaaS -->
    <aside class="w-64 h-screen fixed left-0 top-0 bg-indigo-950 dark:bg-gray-950 text-white flex flex-col shadow-xl z-50">
        <!-- Logo / Identidade SaaS -->
        <div class="p-6 flex flex-col items-center justify-center border-b border-indigo-800 dark:border-gray-800">
            <span class="text-xs font-semibold uppercase tracking-widest text-indigo-300 mb-1">Admin</span>
            <h1 class="text-xl font-bold tracking-wider text-white">⚙ Painel SaaS</h1>
        </div>

        <!-- Navegação SaaS -->
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="{% url 'saas_dashboard' %}"
                class="flex items-center px-4 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition-colors {% if request.resolver_match.url_name == 'saas_dashboard' %}bg-indigo-800 text-white{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Todas as Lojas
            </a>
            <a href="{% url 'saas_store_create' %}"
                class="flex items-center px-4 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition-colors {% if request.resolver_match.url_name == 'saas_store_create' %}bg-indigo-800 text-white{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Nova Loja
            </a>
        </nav>

        <!-- Usuário / Logout -->
        <div class="p-4 border-t border-indigo-800 dark:border-gray-800">
            <div class="flex items-center mb-4 px-2">
                <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-sm font-bold">
                    {{ request.user.username|slice:":1"|upper }}
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium text-white">{{ request.user.username }}</p>
                    <p class="text-xs text-indigo-300">Superadmin</p>
                </div>
            </div>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit"
                    class="w-full flex items-center justify-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none">
                    Sair
                </button>
            </form>
        </div>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="ml-64 p-8 min-h-screen">
        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for message in messages %}
            <div class="px-4 py-3 rounded-lg text-sm font-medium
                {% if message.tags == 'success' %}bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-200
                {% elif message.tags == 'error' %}bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-200
                {% else %}bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>

</html>
