<form id="delivery-toggle-btn"
      hx-post="{% url 'toggle_delivery' %}"
      hx-target="#delivery-toggle-btn"
      hx-swap="outerHTML">
    {% csrf_token %}
    {% if delivery_enabled %}
    <button type="submit"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-200 border border-green-300 dark:border-green-700 hover:bg-green-200 dark:hover:bg-green-900/70 transition">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-green-500"></span>
        Loja aberta — Fechar agora
    </button>
    {% else %}
    <button type="submit"
            class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-red-100 dark:bg-red-900/40 text-red-800 dark:text-red-200 border border-red-300 dark:border-red-700 hover:bg-red-200 dark:hover:bg-red-900/70 transition">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-red-500"></span>
        Loja fechada — Abrir agora
    </button>
    {% endif %}
</form>
