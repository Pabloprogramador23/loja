<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    {% for product in products %}
    <div
        class="group bg-white dark:bg-gray-800 rounded-xl shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 dark:border-gray-700 overflow-hidden flex flex-col h-full">
        <!-- Image Area -->
        <div class="relative w-full pb-[60%] overflow-hidden bg-gray-100 dark:bg-gray-700">
            {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}"
                class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            {% else %}
            <div class="absolute inset-0 flex items-center justify-center text-gray-300 dark:text-gray-600 bg-gray-50 dark:bg-gray-800/50">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="1.25" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 3v8a3 3 0 003 3h0a3 3 0 003-3V3M9 3v8M9 14v7" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 3v11h-3.5A1.5 1.5 0 0113 12.5v-3A6.5 6.5 0 0119.5 3h.5zM17 14v7" />
                </svg>
            </div>
            {% endif %}
        </div>

        <!-- Content -->
        <div class="p-4 flex flex-col flex-1">
            <div class="flex-1">
                <div class="flex justify-between items-start mb-1">
                    <h3
                        class="text-lg font-bold text-gray-800 dark:text-gray-100 line-clamp-1 group-hover:text-purple-600 dark:group-hover:text-purple-400 transition-colors">
                        {{ product.name }}</h3>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2 mb-3 h-10">{{ product.description }}</p>
            </div>

            <!-- Footer: Price & Add -->
            <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-50 dark:border-gray-700">
                <span class="text-lg font-bold text-gray-900 dark:text-gray-100">R$ {{ product.price }}</span>

                <button hx-post="{% url 'add_to_cart' product.id %}" hx-target="#cart-count" hx-swap="outerHTML"
                    class="flex items-center justify-center w-10 h-10 rounded-full bg-purple-50 text-purple-600 dark:bg-purple-900/40 dark:text-purple-300 hover:bg-purple-600 hover:text-white dark:hover:bg-purple-600 dark:hover:text-white transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-span-full text-center py-16">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-700 mb-4">
            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                </path>
            </svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900 dark:text-gray-100">Nenhum produto encontrado</h3>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Tente selecionar outra categoria.</p>
    </div>
    {% endfor %}
</div>

<!-- OOB Update for Category Pills -->
<div hx-swap-oob="true" id="category-nav-container">
    {% include 'core/partials/category_pills.html' %}
</div>
