<div class="h-full flex flex-col items-center justify-center p-6 text-center animate-fade-in">
    <div class="w-20 h-20 bg-green-100 dark:bg-green-900/40 rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Pedido Recebido!</h2>
    <p class="text-gray-600 dark:text-gray-300 mb-6">
        Obrigado, <strong>{{ order.customer_name }}</strong>.<br>
        Seu pedido #{{ order.id }} está sendo processado.
    </p>
    <div class="bg-gray-50 dark:bg-gray-900 rounded p-4 w-full mb-6 text-left">
        <p class="text-sm text-gray-500 dark:text-gray-400">Total Pago:</p>
        <p class="text-xl font-bold text-gray-900 dark:text-gray-100">R$ {{ order.total_amount }}</p>
    </div>

    <button _="on click add .translate-x-full to #cart-drawer"
        class="text-indigo-600 dark:text-indigo-400 font-semibold hover:text-indigo-800 dark:hover:text-indigo-300">
        Fechar
    </button>

    <!-- Clear Cart Counter via OOB -->
    <span id="cart-count" hx-swap-oob="true" class="bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">
        0
    </span>
</div>
