version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: loja_db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=store_saas
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d store_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - loja_network

  redis:
    image: redis:7-alpine
    container_name: loja_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - loja_network

  web:
    build: .
    container_name: loja_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             uvicorn store_saas.asgi:application --host 0.0.0.0 --port 8000 --workers 2"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    networks:
      - loja_network
      - proxy

  worker:
    build: .
    container_name: loja_worker
    command: celery -A store_saas worker --loglevel=info
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    networks:
      - loja_network

volumes:
  postgres_data_prod:
  media_data:

networks:
  loja_network:
    driver: bridge
  proxy:
    external: true
